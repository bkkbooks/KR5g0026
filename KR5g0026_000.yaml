front:
  text: 太上正一解五音咒詛秘籙物七據某郷貫居住奉道信士某詞稱本命某年月日時建生上屬北斗某星君注照即日謹齎法信叩頭恭詣龍虎山嗣漢天師眞人門下拜受太上解五音咒詛籙一階解釋咒詛蕩禳魘禱消災度厄延壽長年敬受奉行克符效信有違科約坐見中傷一如玄科律令
  hash: sha256:8fd7c59936b1bd26dcc2ba37813223f7958d2d36cb24a3fbfa72e14e75711ab6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0026_HFL_000-001a, image: hfl/0880/0880-024.png}
body:
  text: 東方九夷甲乙君領兵九千人飜解春三月咒詛南方八蠻丙丁君領兵三千人飜解夏三月咒詛西方六戎庚辛君領兵七千人飜解秋三月咒詛北方五狄壬癸君領兵五千人飜解冬三月咒詛中央三秦戊己君領兵一萬二千人飜解四季月咒詛弟子某或被惡人圖畫形像以刀刺心或道上神社壇場牢獄山林溪澗井竈之間或與河伯水官俗中邪師凡有鬼神之處咒詛百端致生災害奉請太元兵士百萬衆又請飜倒君兵士十萬人一合來下悉皆解之放遣魂魄不得拘留平和神炁消蕩災凶急急如律令已上符篆並丹書正一眞人曰吾觀世間男女多爲惡人魘禱指斥天地呼證鬼神興諸咒詛百盟之鬼所見拘縶使人動止轗軻夢寢不寧怪異妄生妖祥屢見無由解釋以致殞傷深可哀憫於是即詣太清天中老君金闕之下殷勤禮請乞開紫陽之宫啓雲錦之笈請太上解五音咒詛妙籙傳付世間善信之士得叅佩者即免斯苦克終天年永無夭惡子冝敬奉焉弟子某即日齎持法信恭詣天師門下拜受太上解五音咒詛祕籙一階佩受之後誓遵盟約一旦有違甘當㝠考不敢怨道咎師一如玄科律令太上正一解五音咒詛祕籙請籙法詞太上正一解五音咒詛祕籙請法詞維某年某太歲某月某朔某日某辰某郷貫居住奉道信士某詞稱本命某年月日時建生上屬北斗某星君即日謹齎法信叩頭恭詣龍虎山嗣漢天師眞人門下拜受太上解五音咒詛祕籙一階供養尊禮伏以天災物癘固塵世之常然鬼責人非豈本心之欲爾世諦謂之咒詛道書乃曰寃憎義雖不同理或有是至有終日不解歷世相仍聞諫愈憎巧言莫喻惟吾大道憫念此徒興慈悲心舉直措枉飛符攝籙挫銳解紛俾其和氣自然嗔心不動求哀末學未省過尤稽首師尊願垂拯救某無任懇禱之至謹詞天師門下據弟子某齎持法信詣道自陳求受太上解五音咒詛祕籙一階及請眞師寳諱終身敬奉今來所據投詞即日告盟天地立誓三官破劵分環依科傳授給付如後籙一階太上解五音咒詛祕籙儀式正一修眞㫖要祖玄眞三師玉諱祖師三天扶教輔元大法師正一沖玄神化靜應顯佑眞君張道陵玄師嗣師太清演教妙道眞君張衡眞師系師太清昭化廣德眞君張魯經籍度三師法諱經師上清經籙南曹眞士玉府上𡖖都天大法主嗣漢四十二代天師張正常籍師上清經籙太極執法眞宰靈寳領教眞人都天大法主嗣漢四十三代天師張字初度師上清寳籙靈寳領教玄化眞人南曹執法仙宰都天大法主嗣教四十四代天師張宇清臨壇師法名證盟師監度師保舉師天師正應先生曰紫陽寳誥雲笈靈文解咒詛之牽纏破魘謀之隂害始傳聖筆載在玄文授付世人消諸横惡故我太上設教流傳世學由是歷代眞師對敭寳訓汲引有縁繩繩不絶我以夙慶世戴國恩紹正一之師稱振天目之宗緒第法籙傳世寖遠乃選良匠鋟木成書以久其傳若夫禁戒持守惻隱慈悲從古至人若不如是登壇善信各宜滌除玄覽積行累功庶幾有願皆符自此超凡入妙昭然盟載可不愼歟天師廣微子曰我家以太上符籙濟度人天保鎮國祚千有五百餘歲矣祖訓孔昭奚庸贅贊惟我先眞君際遇聖朝混一區宇首見尊崇江南冠褐咸隸管領予襲教以來三朝帝闕疊被恩光恭遇龍飛特頒焕號以精嚴比虚靖謂衹肅似沖和加官徵例於唐朝胙土進封於留國做好事傳法籙俾紹先猷祈福貺禦民災欽承聖訓祈天永命敢不衹勤度籙傳符益彰開化上以對敭天子丕顯之命下以敷錫庶民皇極之休尚克時忱以介景福正一元壇保舉師上清三洞經籙某保舉到奉道信士某叅受太上解五音咒詛祕籙皈身佩奉本壇除已具録事由躬請正一嗣教天師眞人申聞祖天師正一眞君依科傳度外爰給詞以爲證俾遵教以奉行倘負盟言自貽玄憲太上正一解五音咒詛秘籙
